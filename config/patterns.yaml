# quiz-gen pattern config
# All regexes are Python (re module). Use raw strings semantics.
# Users can override any block by placing a file at one of:
#   ./.quiz-gen/patterns.yaml         (project local)
#   ~/.quiz-gen/patterns.yaml         (user global)
# The skill loader merges user values over these defaults.

# ---------------------------------------------------------------------
# Heading / chapter detection
# ---------------------------------------------------------------------
chapter:
  # If a paragraph matches ANY of these, it is treated as Heading 1
  text_patterns:
    - '^第[一二三四五六七八九十百零０-９0-9]+章\s'
    - '^第[一二三四五六七八九十百零０-９0-9]+部分\s'
    - '^第[一二三四五六七八九十百零０-９0-9]+单元\s'
    - '^Chapter\s+\d+'
    - '^Part\s+[IVX0-9]+'
    - '^Unit\s+\d+'
    - '^导论$'
    - '^前言$'
    - '^Introduction$'
    - '^绪论$'
  # In .md/.txt, lines starting with `# ` are also chapters

section:
  # If a paragraph matches ANY of these, switch question-type context.
  # Patterns are anchored at line start so that question text containing
  # the keyword ("...本节单选题占多数...") is NOT misread as a section header.
  single_patterns:
    - '^\s*[一二三四五六七]?\s*[、.]?\s*单选题\s*$'
    - '^\s*[一二三四五六七]?\s*[、.]?\s*单项选择题\s*$'
    - '^\s*单选\s*$'
    - '^\s*Single[\s\-]*Choice\s*$'
    - '^\s*Single Answer\s*$'
  multi_patterns:
    - '^\s*[一二三四五六七]?\s*[、.]?\s*多选题\s*$'
    - '^\s*[一二三四五六七]?\s*[、.]?\s*多项选择题\s*$'
    - '^\s*多选\s*$'
    - '^\s*Multi[\s\-]*Choice\s*$'
    - '^\s*Multiple[\s\-]*Choice\s*$'
  tf_patterns:
    - '^\s*[一二三四五六七]?\s*[、.]?\s*判断题\s*$'
    - '^\s*[一二三四五六七]?\s*[、.]?\s*是非题\s*$'
    - '^\s*True[\s/\-]*False\s*$'
    - '^\s*T/F\s*$'
  fill_patterns:
    - '^\s*[一二三四五六七]?\s*[、.]?\s*填空题\s*$'
    - '^\s*Fill[\s\-]*in[\s\-]*the[\s\-]*Blank\s*$'
    - '^\s*Fill in\s*$'
  short_patterns:
    - '^\s*[一二三四五六七]?\s*[、.]?\s*简答题\s*$'
    - '^\s*[一二三四五六七]?\s*[、.]?\s*主观题\s*$'
    - '^\s*Short[\s\-]*Answer\s*$'

# ---------------------------------------------------------------------
# Question number prefix (stripped before storing the question text)
# ---------------------------------------------------------------------
question_number:
  # Matched at start of line — group 1 is the number, dropped along with sep
  patterns:
    - '^\s*(\d+)\s*[\.\．、）)\s]+'
    - '^\s*[（(](\d+)[）)]\s*'
    - '^\s*([①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳])\s*'
    - '^\s*Q(\d+)[\:\.\s]+'

# ---------------------------------------------------------------------
# Option markers (A/B/C/D/E/F and Chinese variants)
# ---------------------------------------------------------------------
options:
  letters: ['A', 'B', 'C', 'D', 'E', 'F']
  # Aliases: each list maps to the canonical letter
  aliases:
    A: ['A', 'a', 'Ａ', 'ａ', '①', '一', '甲', '(1)', '（1）', '1']
    B: ['B', 'b', 'Ｂ', 'ｂ', '②', '二', '乙', '(2)', '（2）', '2']
    C: ['C', 'c', 'Ｃ', 'ｃ', '③', '三', '丙', '(3)', '（3）', '3']
    D: ['D', 'd', 'Ｄ', 'ｄ', '④', '四', '丁', '(4)', '（4）', '4']
    E: ['E', 'e', 'Ｅ', 'ｅ', '⑤', '五', '戊', '(5)', '（5）', '5']
    F: ['F', 'f', 'Ｆ', 'ｆ', '⑥', '六', '己', '(6)', '（6）', '6']
  # Allowed separators between marker and content
  separators: ['.', '．', '、', ':', '：', ' ', '　', ')', '）', ']', '】']

# ---------------------------------------------------------------------
# Answer-line detection
# Capture group 1 = the answer letters / value
#
# ORDER MATTERS: strict letter-only patterns come first so that lines like
#   "答案A"  (no separator)
#   "答案ABC" (no separator)
#   "答案 D"  (single space)
#   "答案：B"
# all match; the fallback `(.+?)` patterns at the bottom handle fill/short
# answers where the value is arbitrary text. Without the strict patterns,
# "答案A" silently falls through and the previous question swallows every
# subsequent line until a separator-using answer line appears, corrupting
# the option text of one question and dropping all questions in between.
# ---------------------------------------------------------------------
answer:
  patterns:
    # Strict — letter-only answers, allowing zero or more separators
    - '^\s*答案[\s:：\.\-]*([ABCDabcd]+)\s*$'
    - '^\s*正确答案[\s:：\.\-]*([ABCDabcd]+)\s*$'
    - '^\s*参考答案[\s:：\.\-]*([ABCDabcd]+)\s*$'
    - '^\s*答\s*[:：]\s*([ABCDabcd]+)\s*$'
    - '^\s*Answer[\s:：\.\-]*([ABCDabcdTFtf]+)\s*$'
    - '^\s*Ans[\s:：\.\-]*([ABCDabcdTFtf]+)\s*$'
    - '^\s*Correct\s+Answer[\s:：\.\-]*([ABCDabcdTFtf]+)\s*$'
    - '^[\[【]\s*答案\s*[\]】][\s:：\.\-]*([ABCDabcd]+)\s*$'
    # Fallback — arbitrary text answers (fill / short / TF in 对/错 form)
    # require at least one separator so they don't false-match heading-like text
    - '^\s*答案[\s:：\.\-]+(.+?)\s*$'
    - '^\s*正确答案[\s:：\.\-]+(.+?)\s*$'
    - '^\s*参考答案[\s:：\.\-]+(.+?)\s*$'
    - '^\s*Answer[\s:：\.\-]+(.+?)\s*$'

# ---------------------------------------------------------------------
# Explanation-line detection
# Capture group 1 = explanation text
# ---------------------------------------------------------------------
explanation:
  patterns:
    - '^\s*解析[\s:：\.\-]+(.+?)\s*$'
    - '^\s*答案解析[\s:：\.\-]+(.+?)\s*$'
    - '^\s*详解[\s:：\.\-]+(.+?)\s*$'
    - '^\s*考点[\s:：\.\-]+(.+?)\s*$'
    - '^\s*Explanation[\s:：\.\-]+(.+?)\s*$'
    - '^[\[【]\s*解析\s*[\]】][\s:：\.\-]*(.+?)\s*$'

# ---------------------------------------------------------------------
# True/False answer normalization
# Each list maps to the canonical answer letter (A=true, B=false)
# ---------------------------------------------------------------------
tf_answers:
  A: ['A', '对', '正确', '是', 'T', 'True', 'Y', 'Yes', '√', '✓', '1']
  B: ['B', '错', '错误', '否', 'F', 'False', 'N', 'No', '×', '✗', '0']

# ---------------------------------------------------------------------
# Strings to ignore (publisher attribution lines etc.)
# ---------------------------------------------------------------------
ignore:
  prefixes:
    - '（出题人'
    - '(出题人'
    - '【出题人'
    - '出题人：'
    - 'Author:'
